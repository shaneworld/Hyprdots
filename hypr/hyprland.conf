# в–Ҳв–Җв–„в–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–Ҳ
# в–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–„

monitor=,preferred,auto,auto
monitor = DP-2, 3840x2160@60, auto, 2
# monitor = eDP-1, disable

# exec = gsettings set org.gnome.desktop.interface icon-theme Papirus


# в–Ҳв–‘в–‘вҖғв–„в–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–‘в–Ҳ
# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Җв–Ҳ

exec-once = waybar # launch the system panel
exec-once = hyprpaper # launch wallpaper 
exec-once = blueman-applet # systray app for BT
exec-once = nm-applet --indicator # systray app for Network/Wifi
exec-once = dunst # start notification demon
exec-once = udiskie &
exec-once = fcitx5 --replace -d
# Some default env vars.
env = XCURSOR_SIZE,24


# в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 0

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}



# в–Ҳв–‘в–‘вҖғв–„в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘вҖғв–„в–Ҳ

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1.5
    col.active_border = rgba(90ceaaff) rgba(ecd3a0ff) 45deg
    col.inactive_border = rgba(1e8b50d9) rgba(50b050d9) 45deg
    layout = dwindle
}

decoration {

    rounding = 10

    blur {
        enabled = true
        size = 20
        passes = 2
        new_optimizations = on
    }

    drop_shadow = yes
    shadow_range = 10
    shadow_render_power = 7
    col.shadow=0xffa7caff
    col.shadow_inactive=0x50000000
}

# Blur for waybar 
# blurls=waybar
# blurls=lockscreen


animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = on
}

# Example per-device config
device:epic-mouse-v1 {
    sensitivity = -0.5
}


# в–Ҳв–‘в–Ҳв–‘в–ҲвҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–Ҳв–‘в–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Ҳв–‘в–‘вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Җв–„в–Җв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–Ҳв–„в–ҲвҖғв–Җв–„в–Җв–„в–ҖвҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

